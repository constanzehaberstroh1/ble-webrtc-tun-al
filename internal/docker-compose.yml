version: "3.8"

services:
  ble-tunnel-server:
    build: .
    container_name: ble-tunnel-server
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv4.ip_forward=1
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - ROLE=server
      - TUN_IP=10.0.0.1
      - ADMIN_LISTEN_ADDR=:8080
    volumes:
      - ./logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
